<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home Launch Pad</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6f8;
        color: #333;
    }

    header {
        background: #1e3a8a;
        color: white;
        padding: 30px 20px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px;
        padding: 0 20px;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .card a {
        text-decoration: none;
        color: #1e3a8a;
        font-size: 20px;
        font-weight: bold;
    }

    footer {
        text-align: center;
        margin-top: 50px;
        padding: 20px;
        color: #777;
        font-size: 14px;
    }
</style>
</head>

<body>

<header>
    Welcome to the Ikawsoft Systems Portal
</header>

<div class="container">

    <div class="card">
        <a href="https://www.ikawsoft.com/website/index.htm">Articles on Information Technology</a>
    </div>

    <div class="card">
        <a href="https://www.ikawsoft.com/prod/app/DR/login.php">Disaster Recovery Tracker</a>
    </div>

</div>

<footer>

</footer>

</body>
</html>
